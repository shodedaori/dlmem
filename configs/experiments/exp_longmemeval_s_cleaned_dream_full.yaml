experiment_name: exp_longmemeval_s_cleaned_dream_full

model:
  name: dream
  model_name_or_path: Dream-org/Dream-v0-Instruct-7B
  max_new_tokens: 512
  steps: 10
  temperature: 0.2
  top_p: 0.95
  alg: entropy

memory:
  name: full_context
  # max_turns: null

benchmark:
  name: longmemeval
  data_path: data/longmemeval_s_cleaned.json
  split: s_cleaned

runner:
  seed: 42
  save_traces: true
  output_dir: outputs/exp_longmemeval_s_cleaned_dream_full
